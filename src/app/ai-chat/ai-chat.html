<!-- =====================================================
     Claude-style AI Chat Layout
     ===================================================== -->
<div class="ai-page">

  <!-- ── Top bar ── -->
  <header class="ai-topbar">
    <div class="ai-topbar-inner">
      <div class="ai-topbar-brand">
        <div class="ai-brand-dot" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor">
            <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 0 2h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1 0-2h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"/>
          </svg>
        </div>
        <span class="ai-topbar-label">AI Assistant</span>
        <span class="ai-topbar-model">llama-3 · free</span>
      </div>
      <button
        *ngIf="messages.length > 0"
        class="ai-new-btn"
        (click)="clearChat()"
        type="button"
        aria-label="New conversation"
      >
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New chat
      </button>
    </div>
  </header>

  <!-- ── Scrollable messages column ── -->
  <main class="ai-body" role="log" aria-live="polite" aria-label="Chat messages">
    <div class="ai-col">

      <!-- Welcome / empty state -->
      <div *ngIf="messages.length === 0 && !isLoading" class="ai-welcome">
        <div class="ai-welcome-logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="36" height="36" fill="currentColor">
            <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 0 2h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1 0-2h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2zm-2 9a5 5 0 0 0-4.9 4H14v-4H10zm4 0v4h4.9A5 5 0 0 0 14 11zm-5 6a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm6 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/>
          </svg>
        </div>
        <h1 class="ai-welcome-title">How can I help you today?</h1>
        <p class="ai-welcome-sub">Ask anything — studies, campus life, coding, or general knowledge.</p>
        <div class="ai-cards">
          <button class="ai-card" type="button" (click)="quickSend('What is the BIT program in Nepal?')">
            <span class="ai-card-icon">🎓</span>
            <span class="ai-card-text">What is BIT program in Nepal?</span>
          </button>
          <button class="ai-card" type="button" (click)="quickSend('Explain object-oriented programming with examples')">
            <span class="ai-card-icon">💻</span>
            <span class="ai-card-text">Explain OOP with examples</span>
          </button>
          <button class="ai-card" type="button" (click)="quickSend('How to prepare for exams effectively?')">
            <span class="ai-card-icon">📚</span>
            <span class="ai-card-text">Exam preparation tips</span>
          </button>
          <button class="ai-card" type="button" (click)="quickSend('What is cloud computing and its types?')">
            <span class="ai-card-icon">☁️</span>
            <span class="ai-card-text">Cloud computing &amp; its types</span>
          </button>
        </div>
      </div>

      <!-- Messages list -->
      <div class="ai-messages">
        <ng-container *ngFor="let msg of messages; trackBy: trackByIndex">
          <!-- Assistant message -->
          <div *ngIf="msg.role === 'assistant'" class="ai-msg ai-msg--assistant">
            <div class="ai-msg-avatar ai-msg-avatar--ai" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 0 2h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1 0-2h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"/>
              </svg>
            </div>
            <div class="ai-msg-content">
              <div class="ai-msg-body ai-md" [innerHTML]="msg.html"></div>
              <span class="ai-msg-time">{{ formatTime(msg.timestamp) }}</span>
            </div>
          </div>
          <!-- User message -->
          <div *ngIf="msg.role === 'user'" class="ai-msg ai-msg--user">
            <div class="ai-msg-content">
              <div class="ai-msg-bubble">{{ msg.text }}</div>
              <span class="ai-msg-time ai-msg-time--user">{{ formatTime(msg.timestamp) }}</span>
            </div>
          </div>
        </ng-container>

        <!-- Typing indicator -->
        <div *ngIf="isLoading" class="ai-msg ai-msg--assistant">
          <div class="ai-msg-avatar ai-msg-avatar--ai" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
              <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 0 2h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1 0-2h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"/>
            </svg>
          </div>
          <div class="ai-msg-content">
            <div class="ai-typing" aria-label="AI is thinking">
              <span class="ai-typing-dot"></span>
              <span class="ai-typing-dot"></span>
              <span class="ai-typing-dot"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Scroll anchor -->
      <div #messagesEnd class="ai-scroll-anchor"></div>
    </div>
  </main>

  <!-- ── Error strip ── -->
  <div *ngIf="error" class="ai-error" role="alert">
    <span>⚠️ {{ error }}</span>
    <button (click)="error = ''" type="button" aria-label="Dismiss">×</button>
  </div>

  <!-- ── Fixed bottom input ── -->
  <footer class="ai-footer">
    <div class="ai-input-wrap">
      <div class="ai-input-box">
        <textarea
          #textarea
          class="ai-textarea"
          [(ngModel)]="userInput"
          (input)="onTextareaInput($event)"
          (keydown)="onKeyDown($event)"
          placeholder="Ask anything…"
          rows="1"
          [disabled]="isLoading"
          aria-label="Message input"
        ></textarea>
        <button
          class="ai-send"
          (click)="sendMessage()"
          [disabled]="!userInput.trim() || isLoading"
          [class.ai-send--active]="userInput.trim().length > 0 && !isLoading"
          type="button"
          aria-label="Send"
        >
          <svg *ngIf="!isLoading" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
          <span *ngIf="isLoading" class="ai-send-spinner" aria-hidden="true"></span>
        </button>
      </div>
      <p class="ai-footer-hint">AI can make mistakes. Verify important information.</p>
    </div>
  </footer>


</div>
